name: ignition_mobile
description: Ignition Mobile — a Flutter mobile application for the Ignition Pay ecosystem.
version: 0.1.0
publish_to: 'none'

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_dotenv: ^5.1.0
  dio: ^5.7.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  firebase_core: ^3.13.1
  firebase_analytics: ^11.4.5
  go_router: ^14.6.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  stellar_address_kit:
    path: ../packages/core-dart

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  test: ^1.24.0
  mockito: ^5.4.4
  mocktail: ^1.0.3
  build_runner: ^2.4.0
  flutter_lints: ^3.0.1
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
  assets:
    - .env